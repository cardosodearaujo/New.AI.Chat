<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <style>
    .box { fill: #fff; stroke: #2d3748; stroke-width: 2; rx:6; }
    .text { font-family: Arial, sans-serif; font-size:13px; fill:#0b1220 }
    .arrow { stroke: #4a5568; stroke-width:2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
    </marker>
  </defs>

  <rect x="20" y="20" width="140" height="40" class="box" />
  <text x="90" y="45" text-anchor="middle" class="text">User</text>

  <rect x="180" y="20" width="140" height="40" class="box" />
  <text x="250" y="45" text-anchor="middle" class="text">API</text>

  <rect x="340" y="20" width="160" height="40" class="box" />
  <text x="420" y="45" text-anchor="middle" class="text">Vector Index</text>

  <rect x="520" y="20" width="140" height="40" class="box" />
  <text x="590" y="45" text-anchor="middle" class="text">NER</text>

  <rect x="20" y="100" width="180" height="40" class="box" />
  <text x="110" y="125" text-anchor="middle" class="text">LLM</text>

  <path d="M160 40 L180 40" class="arrow" />
  <path d="M320 40 L340 40" class="arrow" />
  <path d="M500 40 L520 40" class="arrow" />
  <path d="M250 60 L250 100" class="arrow" />
  <path d="M420 60 L420 100" class="arrow" />
  <path d="M110 120 L250 120" class="arrow" />
  <path d="M410 120 L250 120" class="arrow" />

  <text x="250" y="95" class="text" text-anchor="middle">Send prompt + context</text>
</svg>
