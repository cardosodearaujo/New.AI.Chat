<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <style>
    .box { fill: #fff; stroke: #2b6cb0; stroke-width: 2; rx:6; }
    .text { font-family: Arial, sans-serif; font-size:13px; fill:#0b1220 }
    .arrow { stroke: #4a5568; stroke-width:2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
    </marker>
  </defs>

  <rect x="20" y="20" width="160" height="40" class="box" />
  <text x="100" y="45" text-anchor="middle" class="text">Client (CLI / API)</text>

  <rect x="220" y="20" width="160" height="40" class="box" />
  <text x="300" y="45" text-anchor="middle" class="text">IngestionService</text>

  <rect x="420" y="20" width="120" height="40" class="box" />
  <text x="480" y="45" text-anchor="middle" class="text">Validation</text>

  <rect x="220" y="80" width="160" height="40" class="box" />
  <text x="300" y="105" text-anchor="middle" class="text">Chunking (macro & micro)</text>

  <rect x="420" y="80" width="180" height="40" class="box" />
  <text x="510" y="105" text-anchor="middle" class="text">Embeddings (nomic/local)</text>

  <rect x="220" y="140" width="380" height="28" class="box" />
  <text x="410" y="158" text-anchor="middle" class="text">Persistence (Postgres + pgvector)</text>

  <path d="M180 40 L220 40" class="arrow" />
  <path d="M380 40 L420 40" class="arrow" />
  <path d="M480 60 L480 80" class="arrow" />
  <path d="M300 120 L300 100" class="arrow" />
  <path d="M600 100 L600 140" class="arrow" />
  <path d="M420 100 L420 120" class="arrow" />
</svg>
